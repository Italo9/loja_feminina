# cloudbuild.yaml — Deploy da Lumiére no Google Cloud Run
# 
# Uso:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Pré-requisitos (execute uma vez):
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com secretmanager.googleapis.com
#   gcloud artifacts repositories create lumiere --repository-format=docker --location=southamerica-east1
#
# Secrets necessários no Secret Manager (crie com nomes isolados):
#   gcloud secrets create lumiere-auth-secret --data-file=- <<< "sua-chave-64-chars"
#   gcloud secrets create lumiere-database-url --data-file=- <<< "postgresql://..."
#   gcloud secrets create lumiere-mp-access-token --data-file=- <<< "APP_USR-..."
#   gcloud secrets create lumiere-nvidia-api-key --data-file=- <<< "nvapi-..."
#   gcloud secrets create lumiere-google-client-id --data-file=- <<< "..."
#   gcloud secrets create lumiere-google-client-secret --data-file=- <<< "..."
#
#   # Dar permissão pro Cloud Run acessar os secrets:
#   gcloud secrets add-iam-policy-binding lumiere-auth-secret \
#     --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID"
      - -t
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest"
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lumiere-web
      - --image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production
      - --set-env-vars=NEXT_PUBLIC_SITE_URL=_(definido_no_deploy)_
      - --set-env-vars=NEXT_PUBLIC_STORE_NAME="Lumière"
      - --set-env-vars=NEXT_PUBLIC_STORE_TAGLINE="Para mulheres que brilham naturalmente"
      - --set-env-vars=NEXT_PUBLIC_STORE_SHORT_NAME="Lumière"
      - --set-env-vars=NEXT_PUBLIC_STORE_DESCRIPTION="Lumière — boutique feminina premium."
      - --set-env-vars=NEXT_PUBLIC_STORE_CITY="Salvador, BA"
      - --set-env-vars=NEXT_PUBLIC_STORE_WHATSAPP=5571997006042
      - --set-env-vars=NEXT_PUBLIC_STORE_EMAIL="contato@lumiere.com.br"
      - --set-env-vars=NEXT_PUBLIC_STORE_INSTAGRAM="lumiere"
      - --set-env-vars=NEXT_PUBLIC_ASSISTANT_NAME="Jade"
      - --set-env-vars=NEXT_PUBLIC_ASSISTANT_ROLE="sua stylist virtual"
      - --set-env-vars=NEXT_PUBLIC_DEVELOPER_NAME="Lumière"
      - --set-env-vars=NEXT_PUBLIC_DEVELOPER_URL="https://lumiere.com.br"
      - --set-secrets=AUTH_SECRET=lumiere-auth-secret:latest
      - --set-secrets=DATABASE_URL=lumiere-database-url:latest
      - --set-secrets=MP_ACCESS_TOKEN=lumiere-mp-access-token:latest
      - --set-secrets=NVIDIA_API_KEY=lumiere-nvidia-api-key:latest
      - --set-secrets=GOOGLE_CLIENT_ID=lumiere-google-client-id:latest
      - --set-secrets=GOOGLE_CLIENT_SECRET=lumiere-google-client-secret:latest

images:
  - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID"
  - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest"

timeout: 1200s
