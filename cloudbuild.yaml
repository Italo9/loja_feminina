# cloudbuild.yaml — Deploy no Google Cloud Run
# 
# Uso:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Pré-requisitos:
#   - Cloud Run API ativada
#   - Artifact Registry criado
#   - Cloud SQL (PostgreSQL) configurado
#   - Secrets armazenados no Secret Manager

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:${SHORT_SHA}"
      - -t
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:latest"
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - joia-web
      - --image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:${SHORT_SHA}
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=NVIDIA_API_KEY=nvidia-api-key:latest
      - --set-secrets=AUTH_SECRET=auth-secret:latest
      - --set-secrets=STRIPE_SECRET_KEY=stripe-secret-key:latest
      - --set-secrets=DATABASE_URL=database-url:latest

images:
  - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:${SHORT_SHA}"
  - "southamerica-east1-docker.pkg.dev/$PROJECT_ID/joia/web:latest"

timeout: 1200s
