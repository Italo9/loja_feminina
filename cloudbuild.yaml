# cloudbuild.yaml — Deploy com BuildKit e cache de layers otimizado
#
# Cache inteligente: só npm run build roda quando source muda.
# npm ci roda só quando package.json muda.
# Tempo sem mudanças: ~60s. Com mudanças no source: ~90s.

steps:
  # Pull da imagem anterior pra usar como cache
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest || true

  # Build com BuildKit + cache inline (permite cache granular entre builds)
  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - --cache-from=southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest
      - .

  # Push
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker push southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID
        docker push southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest

  # Deploy
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lumiere-web
      - --image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=^~^NODE_ENV=production~AUTH_URL=https://lumiere-web-573565000697.southamerica-east1.run.app~NEXT_PUBLIC_STORE_NAME=Lumière~NEXT_PUBLIC_STORE_TAGLINE=Para mulheres que brilham naturalmente~NEXT_PUBLIC_STORE_SHORT_NAME=Lumière~NEXT_PUBLIC_STORE_CITY=Salvador, BA~NEXT_PUBLIC_STORE_WHATSAPP=5571997006042~NEXT_PUBLIC_ASSISTANT_NAME=Lumi~NEXT_PUBLIC_ASSISTANT_ROLE=sua stylist virtual
      - --set-secrets=AUTH_SECRET=lumiere-auth-secret:latest
      - --set-secrets=DATABASE_URL=lumiere-database-url:latest
      - --set-secrets=MP_ACCESS_TOKEN=lumiere-mp-access-token:latest
      - --set-secrets=NVIDIA_API_KEY=lumiere-nvidia-api-key:latest
      - --set-secrets=GOOGLE_CLIENT_ID=lumiere-google-client-id:latest
      - --set-secrets=GOOGLE_CLIENT_SECRET=lumiere-google-client-secret:latest
      - --set-secrets=CJ_API_KEY=lumiere-cj-api-key:latest

images:
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:$BUILD_ID
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest

timeout: 1200s
