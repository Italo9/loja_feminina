name: Deploy Lumiére

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: lumiere-loja-1782864547

      - name: Deploy
        run: |
          BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --async --format='value(id)')
          echo "Build ID: $BUILD_ID"
          echo "Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=573565000697"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)')
            echo "[$(date +%H:%M:%S)] Status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED)
                echo "::error::Build failed: $STATUS"
                gcloud builds log "$BUILD_ID" 2>&1 | tail -100 || true
                exit 1
                ;;
            esac
            sleep 5
          done
