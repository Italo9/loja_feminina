# cloudbuild-migrate.yaml — Roda prisma db push no banco de produção
#
# Uso:
#   gcloud builds submit --config cloudbuild-migrate.yaml --no-source .
#
# O --no-source evita enviar o código-fonte (usa a imagem já publicada)

steps:
  - name: southamerica-east1-docker.pkg.dev/$PROJECT_ID/lumiere/web:latest
    entrypoint: npx
    args:
      - prisma
      - db
      - push
      - --skip-generate
      - --accept-data-loss
    secretEnv:
      - DATABASE_URL
    env:
      - NODE_ENV=production

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/lumiere-database-url/versions/latest
      env: DATABASE_URL
