services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db
    restart: unless-stopped
